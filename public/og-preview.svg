  <text x="452" y="315" fill="#65E6BD" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif" font-size="32" font-weight="600">中国移动公开资费查询与套餐比较</text>
